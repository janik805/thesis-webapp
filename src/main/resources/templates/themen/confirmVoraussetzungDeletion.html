<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="/bootstrap.min.css" rel="stylesheet">
    <title>Modul löschen</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-primary-subtle">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Thesis is coming!</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02"
                aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/betreuende">Betreuende</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/themen">Themen</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/matching">Matching</a>
                </li>
            </ul>
            <div th:object="${navButton}">
                <a class="btn btn-primary" th:href="*{url}" th:text="*{label}">Anmelden</a>
            </div>
        </div>
    </div>
</nav>

<h1>Möchten Sie dieses Modul wirklich löschen?</h1>
<h2>Diese Aktion löscht das Modul von allen vohandenen Themen.</h2>
<span th:text="${voraussetzung}">Voraussetzung</span>
<form th:action="@{/admin/removeVoraussetzung}" method="post">
    <input type="hidden" th:value="${voraussetzung}" name="voraussetzung">
    <button type="submit" class="btn btn-danger">Thema löschen</button>
</form>
<a th:href="@{/admin/module/edit}" class="btn btn-primary">Nicht löschen</a>
</body>
</html>
