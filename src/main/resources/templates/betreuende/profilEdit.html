<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
    <link rel="stylesheet" href="/bootstrap.min.css"/>
    <script src="/bootstrap.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-primary-subtle">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Thesis is coming!</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02"
                aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/betreuende">Betreuende</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/themen">Themen</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/matching">Matching</a>
                </li>
            </ul>
            <div th:object="${navButton}">
                <a class="btn btn-primary" th:href="*{url}" th:text="*{label}">Anmelden</a>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid py-3" th:object="${profil}">
    <div class="row justify-content-center">
        <div class="col-md-4 text-center mb-4">
            <h1 class="display-4 fw-bold">Profil bearbeiten</h1>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-4 mb-4">
            <div class="card h-100 bg-light">
                <div class="card-body">
                    <form method="post" th:action="@{/betreuende/profilEdit}">
                        <div class="form-group mb-2">
                            <label for="name">Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"/>
                        </div>
                        <button type="submit" class="btn btn-primary">Name ändern</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card h-100 bg-light">
                <div class="card-body">
                    <form method="post" th:action="@{/betreuende/profilEdit/addKontakt}" th:object="${kontakt}">
                        <div class="form-group mb-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{type}" id="radioDefault1"
                                       value="email">
                                <label class="form-check-label" for="radioDefault1">
                                    Email
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{type}" id="radioDefault2"
                                       value="tel" checked>
                                <label class="form-check-label" for="radioDefault2">
                                    Phone
                                </label>
                            </div>
                        </div>
                        <div class="form-group mb-2">
                            <label for="label">Label</label>
                            <input type="text" class="form-control" id="label" th:field="*{label}"/>
                        </div>
                        <div class="form-group mb-2">
                            <label for="wert">E-Mail/Tel</label>
                            <input type="text" class="form-control" id="wert" th:field="*{wert}"/>
                            <small class="text-danger" th:if="${#fields.hasErrors('wert')}" th:errors="*{wert}">Wert
                                Error</small>
                        </div>
                        <button type="submit" class="btn btn-primary">Hinzufügen</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="mb-4">
                <table class="table table-striped">
                    <tbody>
                    <tr th:each="kontakt : *{kontakte}">
                        <td class="w-50">
                            <p>
                                <span th:text="${kontakt.label}">ProfilEmail:</span>
                                <a th:href="${kontakt.href}" th:text="${kontakt.wert}" href="muster@email.com">muster@email.com</a>
                            </p>
                        </td>
                        <td class="w-50">
                            <form method="post" th:action="@{/betreuende/profilEdit/deleteKontakt}">
                                <input type="hidden" name="label" th:value="${kontakt.label}">
                                <input type="hidden" name="wert" th:value="${kontakt.wert}">
                                <input type="hidden" name="kontaktart" th:value="${kontakt.kontaktart}">
                                <button type="submit" class="btn btn-primary">Kontakt löschen</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card h-100 bg-light">
                <div class="card-body">
                    <form method="post" th:action="@{/betreuende/profilEdit/addFachgebiet}">
                        <div class="form-group mb-2">
                            <label for="fachgebiet">Neues Fachgebiet</label>
                            <input type="text" class="form-control" id="fachgebiet" name="fachgebiet"/>
                        </div>
                        <button type="submit" class="btn btn-primary">Neues Fachgebiet hinzufügen</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="mb-4">
                <table class="table table-striped">
                    <tbody>
                    <tr th:each="fachgebiet : *{fachgebiete}">
                        <td class="w-50">
                            <p th:text="${fachgebiet}">Fachgebiet</p>
                        </td>
                        <td class="w-50">
                            <form method="post" th:action="@{/betreuende/profilEdit/removeFachgebiet}">
                                <input type="hidden" name="fachgebiet" th:value="${fachgebiet}">
                                <button type="submit" class="btn btn-primary">Fachgebiet entfernen</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
