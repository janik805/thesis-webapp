<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thema editieren</title>
    <link rel="stylesheet" href="/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-primary-subtle">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Thesis is coming!</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02"
                aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/betreuende">Betreuende</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/themen">Themen</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/matching">Matching</a>
                </li>
            </ul>
            <div th:object="${navButton}">
                <a class="btn btn-primary" th:href="*{url}" th:text="*{label}">Anmelden</a>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">

    <div class="row">

        <div class="col-md-6">
            <div th:object="${themaInfoDTO}">
                <h1>Thema bearbeiten</h1>
                <form th:action="@{/themaEdit/{id}/editInfo(id=${id})}" method="post">
                    <div class="form-group">
                        <label for="titel">Titel</label>
                        <input type="text" class="form-control" id="titel" th:field="*{titel}">
                        <small class="text-danger" th:if="${#fields.hasErrors('titel')}" th:errors="*{titel}">Wert Error</small>
                    </div>
                    <div class="form-group">
                        <label for="beschreibung">Beschreibung</label>
                        <textarea class="form-control" id="beschreibung" th:field="*{beschreibung}" rows="5" cols="33"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Thema editieren</button>
                </form>
            </div>

            <div th:object="${themaLinkDTO}">
                <h1>Links hinzufügen</h1>
                <form th:action="@{/themaEdit/{id}/editLink(id=${id})}" method="post">
                    <div class="form-group">
                        <label for="url">Url</label>
                        <input type="text" class="form-control" id="url" th:field="*{url}" name="url">
                        <small class="text-danger" th:if="${#fields.hasErrors('url')}" th:errors="*{url}">Wert Error</small>
                    </div>
                    <div class="form-group">
                        <label for="urlBeschreibung">Beschreibung der Url</label>
                        <textarea class="form-control" id="urlBeschreibung" th:field="*{urlBeschreibung}" name="urlBeschreibung" rows="5" cols="33"></textarea>
                        <small class="text-danger" th:if="${#fields.hasErrors('urlBeschreibung')}" th:errors="*{urlBeschreibung}">Wert Error</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Url hinzufügen</button>
                </form>
            </div>
        </div>

        <div class="col-md-6">
            <h1>Links löschen</h1>
            <div th:each="link: ${thema.links}">
                <ul>
                    <li><a th:href="@{{link}(link=${link.url})}" th:text="${link.url}"></a></li>
                    <li><span th:text="${link.text}">Beschreibung der Url</span></li>
                </ul>
                <form method="post" th:action="@{/themaEdit/{id}/deleteLink(id=${id})}">
                    <input type="hidden" name="url" th:value="${link.url}">
                    <input type="hidden" name="text" th:value="${link.text}">
                    <button type="submit" class="btn btn-primary">Url löschen</button>
                </form>
            </div>
        </div>
    </div>
</div>
<form th:action="@{/betreuende/profilEdit}">
    <button type="submit" class="btn btn-primary">Zurück zum Bearbeiten</button>
</form>
</body>
</html>
