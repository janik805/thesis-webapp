<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1">
    <title>Voraussetzungen hinzufügen</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-primary-subtle">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Thesis is coming!</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02"
                aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/betreuende">Betreuende</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/themen">Themen</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/matching">Matching</a>
                </li>
            </ul>
            <div th:if="${navButton}" th:object="${navButton}">
                <a class="btn btn-primary" th:href="*{url}" th:text="*{label}">Anmelden</a>
            </div>
        </div>
    </div>
</nav>
<div class="container-fluid py-3">
    <div class="row justify-content-center">
        <div class="col-md-4 mb-4">
            <div class="card bg-light">
                <div class="card-header">
                    <h2 class="display-6">Neues Modul</h2>
                </div>
                <div class="card-body">
                    <form method="POST" th:action="@{/admin/addVoraussetzung}" th:object="${vorDTO}">
                        <div class="form-group mb-2">
                            <label for="vor">Modul hinzufügen</label>
                            <input type="text" class="form-control" id="vor" th:field="*{voraussetzung}">
                            <small class="text-danger" th:if="${#fields.hasErrors('voraussetzung')}"
                                   th:errors="*{voraussetzung}">Wert
                                Error</small>
                        </div>
                        <button type="submit" class="btn btn-primary">Hinzufügen</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card bg-light" style="max-height: 500px">
                <div class="card-body">
                    <h1 class="card-title fw-bold">Modul löschen</h1>
                    <div style="height: 350px;" class="overflow-auto">
                        <table class="table table-striped mb-0">
                            <tbody>
                            <tr th:each="vor: ${vorListe}">
                                <td>
                                    <span th:text="${vor.voraussetzung()}">Name der Voraussetzung</span>
                                </td>
                                <td class="text-end">
                                    <form method="post" th:action="@{/admin/checkRemoveVoraussetzung}">
                                        <input type="hidden" name="voraussetzung" th:value="${vor.voraussetzung()}">
                                        <button type="submit" class="btn-close"></button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
