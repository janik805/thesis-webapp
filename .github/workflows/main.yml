name: Build and Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v1
      - name: Java installieren
        uses: actions/setup-java@v1
        with:
          java-version: 21
      - name: Run Gradle
        run: ./gradlew check
